name: videoforge

services:
  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  worker-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: videoforge-worker:latest
    command: ["node", "dist/api/index.js"]
    env_file:
      - ./apps/worker/.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    init: true
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  worker-queue:
    image: videoforge-worker:latest
    command: ["node", "dist/queue/worker.js"]
    env_file:
      - ./apps/worker/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    init: true
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge

volumes:
  redis_data:
